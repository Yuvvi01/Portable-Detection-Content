id: 15d16424-6ee5-551c-9f88-e481087e8abc
name: "AWS - PrivilegeEscalation - Generic Detection 032"
description: |
  Identifies generic privilege escalation activity in AWS telemetry. This rule is a reusable template and should be tuned with locally approved thresholds, allowlists, and field mappings before production use.
severity: Medium
status: Available
requiredDataConnectors:
- connectorId: AWSConnector
  dataTypes:
  - "AWS"
queryFrequency: 1h
queryPeriod: 1h
triggerOperator: gt
triggerThreshold: 0
tactics:
- PrivilegeEscalation
relevantTechniques:
- T1078
- T1098
query: |
  dataSource.name = 'AWS' AND event.category = 'administrative_activity' AND (event.action contains 'role' OR event.action contains 'permission' OR event.action contains 'policy')
customDetails:
  DataSource: "AWS"
  RuleType: "Single Event"
  AttackType: "PrivilegeEscalation"
version: 1.0.0
kind: Scheduled
