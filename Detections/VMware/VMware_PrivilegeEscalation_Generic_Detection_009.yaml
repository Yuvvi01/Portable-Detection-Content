id: 3f8edd6c-666b-535a-8879-ced83ec7d9d6
name: "VMware - PrivilegeEscalation - Generic Detection 009"
description: |
  Identifies generic privilege escalation activity in VMware telemetry. This rule is a reusable template and should be tuned with locally approved thresholds, allowlists, and field mappings before production use.
severity: Medium
status: Available
requiredDataConnectors:
- connectorId: VMwareConnector
  dataTypes:
  - "VMware"
queryFrequency: 1h
queryPeriod: 1h
triggerOperator: gt
triggerThreshold: 0
tactics:
- PrivilegeEscalation
relevantTechniques:
- T1078
- T1098
query: |
  dataSource.name = 'VMware' AND event.category = 'administrative_activity' AND (event.action contains 'role' OR event.action contains 'permission' OR event.action contains 'policy')
customDetails:
  DataSource: "VMware"
  RuleType: "Single Event"
  AttackType: "PrivilegeEscalation"
version: 1.0.0
kind: Scheduled
