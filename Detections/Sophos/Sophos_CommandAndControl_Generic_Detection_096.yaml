id: bdbde262-cf4a-542e-803c-a888c84e045d
name: "Sophos - CommandAndControl - Generic Detection 096"
description: |
  Identifies generic command and control activity in Sophos telemetry. This rule is a reusable template and should be tuned with locally approved thresholds, allowlists, and field mappings before production use.
severity: High
status: Available
requiredDataConnectors:
- connectorId: SophosConnector
  dataTypes:
  - "Sophos"
queryFrequency: 1h
queryPeriod: 1h
triggerOperator: gt
triggerThreshold: 0
tactics:
- CommandAndControl
relevantTechniques:
- T1071
- T1105
query: |
  dataSource.name = 'Sophos' AND event.category = 'network_activity' AND network.direction = 'outbound' AND (destination.reputation = 'suspicious' OR connection.pattern = 'rare')
customDetails:
  DataSource: "Sophos"
  RuleType: "Correlation"
  AttackType: "CommandAndControl"
version: 1.0.0
kind: Scheduled
