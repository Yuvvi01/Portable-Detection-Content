id: 95ccf44f-61d2-5d97-8d1a-cc40738f5a75
name: "EndpointTelemetry - CredentialAccess - Generic Detection 073"
description: |
  Identifies generic credential access activity in EndpointTelemetry telemetry. This rule is a reusable template and should be tuned with locally approved thresholds, allowlists, and field mappings before production use.
severity: Medium
status: Available
requiredDataConnectors:
- connectorId: EndpointTelemetryConnector
  dataTypes:
  - "EndpointTelemetry"
queryFrequency: 1h
queryPeriod: 1h
triggerOperator: gt
triggerThreshold: 0
tactics:
- CredentialAccess
relevantTechniques:
- T1003
- T1552
query: |
  dataSource.name = 'EndpointTelemetry' AND event.category = 'identity_or_credential_activity' AND (event.action contains 'credential' OR event.action contains 'token' OR event.action contains 'secret')
customDetails:
  DataSource: "EndpointTelemetry"
  RuleType: "Single Event"
  AttackType: "CredentialAccess"
version: 1.0.0
kind: Scheduled
