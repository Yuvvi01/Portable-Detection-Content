id: 93f92216-2295-5a89-a09c-dc8c3e896eaf
name: "GoogleWorkspace - CredentialAccess - Generic Detection 054"
description: |
  Identifies generic credential access activity in GoogleWorkspace telemetry. This rule is a reusable template and should be tuned with locally approved thresholds, allowlists, and field mappings before production use.
severity: Medium
status: Available
requiredDataConnectors:
- connectorId: GoogleWorkspaceConnector
  dataTypes:
  - "GoogleWorkspace"
queryFrequency: 1h
queryPeriod: 1h
triggerOperator: gt
triggerThreshold: 0
tactics:
- CredentialAccess
relevantTechniques:
- T1003
- T1552
query: |
  dataSource.name = 'GoogleWorkspace' AND event.category = 'identity_or_credential_activity' AND (event.action contains 'credential' OR event.action contains 'token' OR event.action contains 'secret')
customDetails:
  DataSource: "GoogleWorkspace"
  RuleType: "Correlation"
  AttackType: "CredentialAccess"
version: 1.0.0
kind: Scheduled
