id: 97c20a42-2bbe-5182-a01f-3084d506e5ad
name: "OKTA - CredentialAccess - Generic Detection 015"
description: |
  Identifies generic credential access activity in OKTA telemetry. This rule is a reusable template and should be tuned with locally approved thresholds, allowlists, and field mappings before production use.
severity: Medium
status: Available
requiredDataConnectors:
- connectorId: OKTAConnector
  dataTypes:
  - "OKTA"
queryFrequency: 1h
queryPeriod: 1h
triggerOperator: gt
triggerThreshold: 0
tactics:
- CredentialAccess
relevantTechniques:
- T1003
- T1552
query: |
  dataSource.name = 'OKTA' AND event.category = 'identity_or_credential_activity' AND (event.action contains 'credential' OR event.action contains 'token' OR event.action contains 'secret')
customDetails:
  DataSource: "OKTA"
  RuleType: "Correlation"
  AttackType: "CredentialAccess"
version: 1.0.0
kind: Scheduled
