id: 801c2dae-931c-5704-9ec7-f0d77baed16e
name: "Web Attack Parameters - Open Redirect Followed by Script Injection"
description: |
  Correlates open redirect parameter abuse with later script-injection probing from the same source. This pattern is useful for finding attackers chaining redirect handling, phishing flows, and reflected input testing against externally exposed applications.
severity: Medium
status: Available
requiredDataConnectors:
- connectorId: WebTelemetryConnector
  dataTypes:
  - "WebTelemetry"
queryFrequency: 30m
queryPeriod: 2h
triggerOperator: gt
triggerThreshold: 0
tactics:
- InitialAccess
- DefenseEvasion
relevantTechniques:
- T1190
- T1566
requiredFields:
- TimeGenerated
- SrcIp
- HttpHost
- Url
- UrlQuery
- HttpStatus
- RedirectLocation
- UserAgent
query: |
  LET RedirectParams = dynamic([
    "next","url","target","rurl","dest","destination","redir","redirect_uri",
    "redirect_url","redirect","to","image_url","go","return","returnTo",
    "return_to","checkout_url","continue","return_path"
  ]);
  LET XssParams = dynamic([
    "q","s","search","id","lang","keyword","query","page","keywords","view",
    "email","type","name","p","image","url","terms","categoryid","key","login"
  ]);
  WebTelemetry
  WHERE UrlQuery HAS_ANY_PARAMETER RedirectParams
  AND UrlQuery HAS_ANY ("://", "%3a%2f%2f", "%2f%2f", "//")
  AND RedirectLocation NOT ENDSWITH approved_primary_domains
  THEN WebTelemetry
  WHERE UrlQuery HAS_ANY_PARAMETER XssParams
  AND UrlQuery HAS_ANY (
    "<script", "%3cscript", "javascript:", "onerror=", "onload=",
    "alert(", "prompt(", "confirm(", "svg/onload", "document.cookie"
  )
  AND HttpStatus BETWEEN 200 AND 499
  WITHIN 60m BY SrcIp, HttpHost, UserAgent
falsePositives:
- Approved scanners testing redirect and reflected input handling
- Marketing or identity-provider redirect flows not yet added to allowlists
- Bug bounty testing from known researcher ranges
tuning:
- Populate approved primary domains and identity-provider redirect destinations.
- Require multiple target URLs or multiple routes for noisy public applications.
- Raise severity when the same source also triggers WAF blocks or credential harvesting indicators.
responseActions:
- Inspect redirect destination, affected route, and whether user-controlled input is reflected.
- Review authentication, password reset, and checkout flows for unsafe redirect handling.
- Add short-term WAF controls while engineering validates the vulnerable endpoint.
customDetails:
  DataSource: "WebTelemetry"
  RuleType: "Behavioral Correlation"
  AttackType: "OpenRedirectCrossSiteScripting"
version: 1.0.0
kind: Scheduled
