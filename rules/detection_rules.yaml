      WHERE PublicIOCs.type IN~ ("ip", "ipv4", "ipv6")
      AND PublicIOCs.status =~ "active"
      AND NetworkDirection IN~ ("outbound", "inbound")
      AND AssetRole NOT IN~ ("approved_scanner", "gateway", "sinkhole", "research")
