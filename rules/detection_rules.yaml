  - id: "23df1543-6abe-59fc-a424-660c57f73dd7"
    state: "Available"
    data_source: "EndpointTelemetry"
    name: "Ransomware Impact - Backup and Recovery Tampering"
    description: |
      Detects attempts to weaken recovery by deleting shadow copies, deleting backup catalogs, disabling recovery settings, stopping backup services, or tampering with backup and hypervisor tooling.
    severity: "Critical"
    rule_type: "Scheduled"
    query: |
      EndpointTelemetry
      WHERE ProcessName IN~ ("vssadmin.exe", "wmic.exe", "wbadmin.exe", "bcdedit.exe", "diskshadow.exe", "powershell.exe", "sc.exe", "net.exe", "taskkill.exe", "wevtutil.exe", "vim-cmd", "esxcli", "govc", "powercli", "aws.exe", "az.exe", "gcloud.exe")
      AND CmdLine HAS_ANY~ ("delete shadows", "shadowcopy delete", "delete catalog", "delete backup", "recoveryenabled no", "bootstatuspolicy ignoreallfailures", "Remove-CimInstance", "Win32_ShadowCopy", "stop vss", "stop wbengine", "stop veeam", "stop backup", "clear-log", "Remove-VMSnapshot", "DeleteRecoveryPoint", "vault delete")
    recommended_tuning: |
      Allow only documented backup maintenance windows and service accounts. Treat activity on backup servers, hypervisors, and domain controllers as critical.
    logic_notes: |
      Attack/category: RansomwareBackupTampering. Tactics: Impact, DefenseEvasion. Techniques: T1490, T1489, T1070. Vendor-neutral template; translate data source and field names before deployment.
  - id: "88886c9a-3861-5888-bfca-f39d4a2658b4"
    state: "Available"
    data_source: "EndpointTelemetry"
    name: "Ransomware Impact - High Confidence Recovery Sabotage"
    description: |
      Detects highly specific recovery sabotage patterns. The query uses component matching to preserve detection value while avoiding dependence on one exact command line.
    severity: "Critical"
    rule_type: "Scheduled"
    query: |
      EndpointTelemetry
      WHERE
        (ProcessName =~ "vssadmin.exe" AND CmdLine HAS_ALL~ ("delete", "shadows"))
        OR (ProcessName =~ "wmic.exe" AND CmdLine HAS_ALL~ ("shadowcopy", "delete"))
        OR (ProcessName =~ "wbadmin.exe" AND CmdLine HAS_ANY~ ("delete catalog", "delete systemstatebackup"))
        OR (ProcessName =~ "bcdedit.exe" AND CmdLine HAS_ANY~ ("recoveryenabled no", "bootstatuspolicy ignoreallfailures"))
        OR (ProcessName =~ "powershell.exe" AND CmdLine HAS_ALL~ ("Win32_ShadowCopy", "Remove-CimInstance"))
    recommended_tuning: |
      This rule should have a narrow allowlist and ticket requirement.
    logic_notes: |
      Attack/category: RansomwareBackupTampering. Tactics: Impact. Techniques: T1490. Vendor-neutral template; translate data source and field names before deployment.
  - id: "c65e9c50-8cac-5efc-a682-70ae3b313c47"
    state: "Available"
