    state: "Available"
    data_source: "PublicThreatIntel"
    name: "Malware Delivery - Source Hosting Download Followed by Script Execution"
    description: |
      Detects downloads from source-code hosting services followed by script or interpreter execution from user-writable paths. This targets abused repository hosting patterns without flagging normal developer traffic alone.
    severity: "High"
    rule_type: "Behavioral Correlation"
    query: |
      WebTelemetry
      WHERE HttpHost IN~ source_code_hosting_domains
      AND UrlPath HAS_ANY~ ("archive", "releases", "raw", "download")
      THEN EndpointTelemetry
      WHERE ProcessName IN~ ("python.exe", "pythonw.exe", "pip.exe", "powershell.exe", "cmd.exe", "wscript.exe", "cscript.exe", "node.exe")
      AND CmdLine HAS_ANY~ ("setup.py", "requirements.txt", "install", "wallet", "browser", "token", "stealer")
      AND ProcessPath MATCHES user_writable_paths
      WITHIN 30m BY Hostname, UserName
    recommended_tuning: |
      Scope developer workstations separately from servers and non-developer endpoints. Allow approved package registries and known build agents.
    logic_notes: |
      Attack/category: SupplyChainInitialAccess. Tactics: InitialAccess, Execution, CredentialAccess. Techniques: T1189, T1204, T1555. Vendor-neutral template; translate data source and field names before deployment.
