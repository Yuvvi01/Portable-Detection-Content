  - id: "a35bb75f-d00f-50f8-91ec-3d2e04e360ae"
    state: "Available"
    data_source: "EndpointTelemetry"
    name: "Ransomware Encryption - High Volume File Modification"
    description: |
      Detects a process performing high-volume file create, modify, rename, or delete activity in a short time window. This is a behavioral encryption or destructive activity signal.
    severity: "Critical"
    rule_type: "Scheduled"
    query: |
      EndpointTelemetry
      WHERE EventType IN~ ("file_modified", "file_renamed", "file_deleted", "file_created")
      AND ProcessName NOT IN~ ("approved_backup", "approved_indexer", "approved_deployment", "approved_dlp")
      GROUP BY Hostname, UserName, ProcessName
      HAVING COUNT(*) > 1000 WITHIN 15m
    recommended_tuning: |
