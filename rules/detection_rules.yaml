      Detects non-approved processes opening LSASS with access rights commonly used for credential dumping. This rule requires process-access telemetry, not only process creation logs.
    severity: "Critical"
    rule_type: "Scheduled"
    query: |
      EndpointTelemetry
      WHERE EventType IN~ ("process_access", "process_handle_open")
      AND TargetProcessName =~ "lsass.exe"
      AND SourceProcessName NOT IN~ ("approved_security_tool", "edr_sensor", "backup_agent")
      AND GrantedAccess IN~ ("0x1010", "0x1410", "0x143a", "0x1fffff", "0x1f0fff")
    recommended_tuning: |
      Maintain a hash/path allowlist for approved security tooling rather than only process names. Increase confidence when dump file creation occurs within 10 minutes.
    logic_notes: |
      Attack/category: RansomwareCredentialTheft. Tactics: CredentialAccess. Techniques: T1003.001. Vendor-neutral template; translate data source and field names before deployment.
  - id: "16caa6b9-f265-59d1-af86-1a04cdab7f45"
    state: "Available"
    data_source: "EndpointTelemetry"
    name: "Ransomware Prep - Lateral Movement via Remote Administration"
    description: |
