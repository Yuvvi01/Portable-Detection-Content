  - id: "573d1fe9-0d40-4d2c-8b41-4f2dbd6e9d01"
    state: "Available"
    data_source: "PublicThreatIntel"
    name: "Malware Threat Intel - File Hash Match With Local Context"
    description: |
      Detects file, process, or download hashes matching active public IOC entries. This rule is intended for confirmed active feeds and should be paired with local execution or file-write context.
    severity: "High"
    rule_type: "Watchlist Match"
    query: |
      EndpointTelemetry
      JOIN PublicIOCs ON FileHash = PublicIOCs.value
      WHERE PublicIOCs.type IN~ ("md5", "sha1", "sha256", "hash")
      AND PublicIOCs.status =~ "active"
      AND ProcessPath NOT MATCHES approved_internal_testing_paths
    recommended_tuning: |
      Require active indicator status and a recent last-seen date when available. Suppress known lab hosts and internal test repositories.
    logic_notes: |
      Attack/category: MalwareExecution. Tactics: Execution, CommandAndControl. Techniques: T1204, T1105. Vendor-neutral template; translate data source and field names before deployment.
