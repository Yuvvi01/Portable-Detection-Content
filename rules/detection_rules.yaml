  - id: "680fa698-5ea5-50ba-a183-ad9a1f2a9db3"
    state: "Available"
    data_source: "WebTelemetry"
    name: "Web Attack Parameters - SSRF or LFI Probe Followed by Server Egress"
    description: |
      Correlates requests containing high-risk SSRF or local file inclusion parameter names with outbound server-side network activity shortly after the request. This catches exploitation patterns where the application server is induced to fetch internal resources, metadata services, or attacker-controlled infrastructure.
    severity: "High"
    rule_type: "Behavioral Correlation"
    query: |
      LET HighRiskWebParams = dynamic([
        "url","uri","path","dest","redirect","continue","next","data","reference",
        "site","html","validate","domain","callback","return","page","feed","host",
        "port","to","out","dir","file","download","folder","include","inc","doc",
        "document","layout","conf"
      ]);
      WebTelemetry
      WHERE HttpMethod IN~ ("GET", "POST")
      AND UrlQuery HAS_ANY_PARAMETER HighRiskWebParams
      AND UrlQuery HAS_ANY (
        "169.254.169.254", "localhost", "127.0.0.1", "::1",
        "/etc/passwd", "boot.ini", "win.ini", "../", "..%2f", "%2e%2e%2f",
        "://", "file:", "gopher:", "dict:"
      )
      AND HttpStatus BETWEEN 200 AND 499
      THEN NetworkTelemetry
      WHERE NetworkDirection =~ "outbound"
      AND DestinationPort IN (80, 443, 8080, 8443, 8000, 9000)
      AND DstIp NOT IN approved_server_egress_destinations
      WITHIN 10m BY ServerHostname
    recommended_tuning: |
      Add expected egress destinations for web servers, proxy services, and metadata-blocking controls. Raise severity when requests target link-local, loopback, RFC1918, or cloud metadata address ranges. Suppress approved scanner source IPs and synthetic monitoring.
    logic_notes: |
      Attack/category: SSRFLocalFileInclusion. Tactics: InitialAccess, Discovery, CommandAndControl. Techniques: T1190, T1595, T1105. Vendor-neutral template; translate data source and field names before deployment.
  - id: "dade0a27-bc82-5312-9fa2-27b79caa00c3"
    state: "Available"
    data_source: "WebTelemetry"
    name: "Web Attack Parameters - SQLi or RCE Probe Followed by Server Error Spike"
    description: |
      Detects concentrated SQL injection or remote command execution probing against common high-risk parameter names, followed by server-side error responses. The correlation focuses on exploit pressure and application instability rather than a single suspicious request.
    severity: "High"
    rule_type: "Behavioral Correlation"
    query: |
      LET InjectionParams = dynamic([
        "id","page","dir","search","category","file","class","url","news","item",
        "menu","lang","name","ref","title","view","topic","thread","type","date",
        "form","join","main","nav","region","cmd","exec","command","execute","ping",
        "query","jump","code","do","func","arg","option","load","process","step",
        "read","function","req","feature","exe","module","payload","run"
      ]);
      WebTelemetry
      WHERE UrlQuery HAS_ANY_PARAMETER InjectionParams
      AND UrlQuery HAS_ANY (
        "' or ", "\" or ", " union select ", " sleep(", " benchmark(",
        "xp_cmdshell", "information_schema", "../", ";id", ";whoami",
        "|id", "|whoami", "`id`", "$(", "%27", "%3b", "%7c"
      )
      SUMMARIZE RequestCount = COUNT(),
                ErrorCount = COUNT_IF(HttpStatus BETWEEN 500 AND 599),
                DistinctParams = DCOUNT(ExtractedParameterName),
                DistinctUrls = DCOUNT(Url)
        BY SrcIp, HttpHost, BIN(TimeGenerated, 10m)
      WHERE RequestCount >= 8
      AND ErrorCount >= 2
      AND DistinctParams >= 2
    recommended_tuning: |
      Maintain allowlists for approved scanners and test source ranges. Tune thresholds per internet-facing application and traffic volume. Increase severity when requests hit authentication, upload, search, or administrative routes.
    logic_notes: |
      Attack/category: SQLInjectionRemoteCodeExecution. Tactics: InitialAccess, Execution. Techniques: T1190, T1059. Vendor-neutral template; translate data source and field names before deployment.
  - id: "801c2dae-931c-5704-9ec7-f0d77baed16e"
    state: "Available"
    data_source: "WebTelemetry"
    name: "Web Attack Parameters - Open Redirect Followed by Script Injection"
    description: |
      Correlates open redirect parameter abuse with later script-injection probing from the same source. This pattern is useful for finding attackers chaining redirect handling, phishing flows, and reflected input testing against externally exposed applications.
    severity: "Medium"
    rule_type: "Behavioral Correlation"
    query: |
      LET RedirectParams = dynamic([
        "next","url","target","rurl","dest","destination","redir","redirect_uri",
        "redirect_url","redirect","to","image_url","go","return","returnTo",
        "return_to","checkout_url","continue","return_path"
      ]);
      LET XssParams = dynamic([
        "q","s","search","id","lang","keyword","query","page","keywords","view",
        "email","type","name","p","image","url","terms","categoryid","key","login"
      ]);
      WebTelemetry
      WHERE UrlQuery HAS_ANY_PARAMETER RedirectParams
      AND UrlQuery HAS_ANY ("://", "%3a%2f%2f", "%2f%2f", "//")
      AND RedirectLocation NOT ENDSWITH approved_primary_domains
      THEN WebTelemetry
      WHERE UrlQuery HAS_ANY_PARAMETER XssParams
      AND UrlQuery HAS_ANY (
        "<script", "%3cscript", "javascript:", "onerror=", "onload=",
        "alert(", "prompt(", "confirm(", "svg/onload", "document.cookie"
      )
      AND HttpStatus BETWEEN 200 AND 499
      WITHIN 60m BY SrcIp, HttpHost, UserAgent
    recommended_tuning: |
