public_threat_intel_rules_by_category:
  "PublicThreatIntelCommandAndControl":
    - id: "pti-ip-match"
      name: "Public Threat Intel - Malicious Network Indicator Match"
      severity: "High"
      path: "Detections/PublicThreatIntel/pti_02_ip_match.yaml"
    - id: "pti-domain-match"
      name: "Public Threat Intel - Malicious Domain or Host Match"
      severity: "High"
      path: "Detections/PublicThreatIntel/pti_03_domain_match.yaml"
    - id: "pti-multi-source"
      name: "Public Threat Intel - Multi Source IOC Match"
      severity: "Critical"
      path: "Detections/PublicThreatIntel/pti_07_multi_source_ioc.yaml"
  "PublicThreatIntelExecution":
    - id: "pti-hash-match"
      name: "Public Threat Intel - Malicious File Hash Match"
      severity: "High"
      path: "Detections/PublicThreatIntel/pti_01_hash_match.yaml"
    - id: "pti-signature-hit"
      name: "Public Threat Intel - YARA or Network Signature Hit"
      severity: "High"
      path: "Detections/PublicThreatIntel/pti_06_signature_hit.yaml"
    - id: "pti-ioc-execution"
      name: "Public Threat Intel - IOC Download Followed by Local Execution"
      severity: "Critical"
      path: "Detections/PublicThreatIntel/pti_08_ioc_then_execution.yaml"
  "PublicThreatIntelInitialAccess":
    - id: "pti-url-match"
      name: "Public Threat Intel - Malicious URL or Path Match"
      severity: "High"
      path: "Detections/PublicThreatIntel/pti_04_url_match.yaml"
    - id: "pti-source-hosting"
      name: "Public Threat Intel - Source Hosting Abuse and Developer Tool Impersonation"
      severity: "High"
      path: "Detections/PublicThreatIntel/pti_05_github_hosted_malware_pattern.yaml"
