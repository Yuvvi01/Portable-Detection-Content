id: d457df01-ca1c-5b26-8379-cd6354c468aa
name: "WindowsEventLogs - CredentialAccess - Generic Detection 047"
description: |
  Identifies generic credential access activity in WindowsEventLogs telemetry. This rule is a reusable template and should be tuned with locally approved thresholds, allowlists, and field mappings before production use.
severity: Medium
status: Available
requiredDataConnectors:
- connectorId: WindowsEventLogsConnector
  dataTypes:
  - "WindowsEventLogs"
queryFrequency: 1h
queryPeriod: 1h
triggerOperator: gt
triggerThreshold: 0
tactics:
- CredentialAccess
relevantTechniques:
- T1003
- T1552
query: |
  dataSource.name = 'WindowsEventLogs' AND event.category = 'identity_or_credential_activity' AND (event.action contains 'credential' OR event.action contains 'token' OR event.action contains 'secret')
customDetails:
  DataSource: "WindowsEventLogs"
  RuleType: "Single Event"
  AttackType: "CredentialAccess"
version: 1.0.0
kind: Scheduled
