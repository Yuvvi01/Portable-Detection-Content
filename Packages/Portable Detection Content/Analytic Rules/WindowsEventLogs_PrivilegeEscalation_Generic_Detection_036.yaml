id: 6a6e92ca-ab0e-58eb-8f91-c208f8a7c31e
name: "WindowsEventLogs - PrivilegeEscalation - Generic Detection 036"
description: |
  Identifies generic privilege escalation activity in WindowsEventLogs telemetry. This rule is a reusable template and should be tuned with locally approved thresholds, allowlists, and field mappings before production use.
severity: Medium
status: Available
requiredDataConnectors:
- connectorId: WindowsEventLogsConnector
  dataTypes:
  - "WindowsEventLogs"
queryFrequency: 1h
queryPeriod: 1h
triggerOperator: gt
triggerThreshold: 0
tactics:
- PrivilegeEscalation
relevantTechniques:
- T1078
- T1098
query: |
  dataSource.name = 'WindowsEventLogs' AND event.category = 'administrative_activity' AND (event.action contains 'role' OR event.action contains 'permission' OR event.action contains 'policy')
customDetails:
  DataSource: "WindowsEventLogs"
  RuleType: "Single Event"
  AttackType: "PrivilegeEscalation"
version: 1.0.0
kind: Scheduled
