id: 41e065bf-67c5-5d11-8f7d-760b427c2b3a
name: "PaloAltoFirewall - CredentialAccess - Generic Detection 012"
description: |
  Identifies generic credential access activity in PaloAltoFirewall telemetry. This rule is a reusable template and should be tuned with locally approved thresholds, allowlists, and field mappings before production use.
severity: High
status: Available
requiredDataConnectors:
- connectorId: PaloAltoFirewallConnector
  dataTypes:
  - "PaloAltoFirewall"
queryFrequency: 1h
queryPeriod: 1h
triggerOperator: gt
triggerThreshold: 0
tactics:
- CredentialAccess
relevantTechniques:
- T1003
- T1552
query: |
  dataSource.name = 'PaloAltoFirewall' AND event.category = 'identity_or_credential_activity' AND (event.action contains 'credential' OR event.action contains 'token' OR event.action contains 'secret')
customDetails:
  DataSource: "PaloAltoFirewall"
  RuleType: "Single Event"
  AttackType: "CredentialAccess"
version: 1.0.0
kind: Scheduled
