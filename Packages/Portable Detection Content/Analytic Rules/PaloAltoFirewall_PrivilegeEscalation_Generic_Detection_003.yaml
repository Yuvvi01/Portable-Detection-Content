id: 9fa6ba28-79c4-5dfe-abc0-d68f0971bb43
name: "PaloAltoFirewall - PrivilegeEscalation - Generic Detection 003"
description: |
  Identifies generic privilege escalation activity in PaloAltoFirewall telemetry. This rule is a reusable template and should be tuned with locally approved thresholds, allowlists, and field mappings before production use.
severity: Medium
status: Available
requiredDataConnectors:
- connectorId: PaloAltoFirewallConnector
  dataTypes:
  - "PaloAltoFirewall"
queryFrequency: 1h
queryPeriod: 1h
triggerOperator: gt
triggerThreshold: 0
tactics:
- PrivilegeEscalation
relevantTechniques:
- T1078
- T1098
query: |
  dataSource.name = 'PaloAltoFirewall' AND event.category = 'administrative_activity' AND (event.action contains 'role' OR event.action contains 'permission' OR event.action contains 'policy')
customDetails:
  DataSource: "PaloAltoFirewall"
  RuleType: "Correlation"
  AttackType: "PrivilegeEscalation"
version: 1.0.0
kind: Scheduled
