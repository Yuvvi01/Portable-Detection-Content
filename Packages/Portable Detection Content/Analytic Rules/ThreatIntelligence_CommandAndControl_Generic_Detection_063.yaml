id: a109f643-db48-533a-ad35-60ca6bd09ee0
name: "ThreatIntelligence - CommandAndControl - Generic Detection 063"
description: |
  Identifies generic command and control activity in ThreatIntelligence telemetry. This rule is a reusable template and should be tuned with locally approved thresholds, allowlists, and field mappings before production use.
severity: High
status: Available
requiredDataConnectors:
- connectorId: ThreatIntelligenceConnector
  dataTypes:
  - "ThreatIntelligence"
queryFrequency: 1h
queryPeriod: 1h
triggerOperator: gt
triggerThreshold: 0
tactics:
- CommandAndControl
relevantTechniques:
- T1071
- T1105
query: |
  dataSource.name = 'ThreatIntelligence' AND event.category = 'network_activity' AND network.direction = 'outbound' AND (destination.reputation = 'suspicious' OR connection.pattern = 'rare')
customDetails:
  DataSource: "ThreatIntelligence"
  RuleType: "Single Event"
  AttackType: "CommandAndControl"
version: 1.0.0
kind: Scheduled
