id: 7f4f04dc-f5e9-563e-86e4-a7442d39265f
name: "Sophos - CredentialAccess - Generic Detection 079"
description: |
  Identifies generic credential access activity in Sophos telemetry. This rule is a reusable template and should be tuned with locally approved thresholds, allowlists, and field mappings before production use.
severity: High
status: Available
requiredDataConnectors:
- connectorId: SophosConnector
  dataTypes:
  - "Sophos"
queryFrequency: 1h
queryPeriod: 1h
triggerOperator: gt
triggerThreshold: 0
tactics:
- CredentialAccess
relevantTechniques:
- T1003
- T1552
query: |
  dataSource.name = 'Sophos' AND event.category = 'identity_or_credential_activity' AND (event.action contains 'credential' OR event.action contains 'token' OR event.action contains 'secret')
customDetails:
  DataSource: "Sophos"
  RuleType: "Correlation"
  AttackType: "CredentialAccess"
version: 1.0.0
kind: Scheduled
