id: f7524093-6570-5f76-afae-685aafbc7fd6
name: "ThreatIntelligence - CredentialAccess - Generic Detection 061"
description: |
  Identifies generic credential access activity in ThreatIntelligence telemetry. This rule is a reusable template and should be tuned with locally approved thresholds, allowlists, and field mappings before production use.
severity: High
status: Available
requiredDataConnectors:
- connectorId: ThreatIntelligenceConnector
  dataTypes:
  - "ThreatIntelligence"
queryFrequency: 1h
queryPeriod: 1h
triggerOperator: gt
triggerThreshold: 0
tactics:
- CredentialAccess
relevantTechniques:
- T1003
- T1552
query: |
  dataSource.name = 'ThreatIntelligence' AND event.category = 'identity_or_credential_activity' AND (event.action contains 'credential' OR event.action contains 'token' OR event.action contains 'secret')
customDetails:
  DataSource: "ThreatIntelligence"
  RuleType: "Single Event"
  AttackType: "CredentialAccess"
version: 1.0.0
kind: Scheduled
