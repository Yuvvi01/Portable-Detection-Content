id: 4243fd37-10e9-5ed6-bf5d-4633df321749
name: "GenericTelemetry - CommandAndControl - Generic Detection 001"
description: |
  Identifies generic command and control activity in GenericTelemetry telemetry. This rule is a reusable template and should be tuned with locally approved thresholds, allowlists, and field mappings before production use.
severity: High
status: Available
requiredDataConnectors:
- connectorId: GenericTelemetryConnector
  dataTypes:
  - "GenericTelemetry"
queryFrequency: 1h
queryPeriod: 1h
triggerOperator: gt
triggerThreshold: 0
tactics:
- CommandAndControl
relevantTechniques:
- T1071
- T1105
query: |
  dataSource.name = 'GenericTelemetry' AND event.category = 'network_activity' AND network.direction = 'outbound' AND (destination.reputation = 'suspicious' OR connection.pattern = 'rare')
customDetails:
  DataSource: "GenericTelemetry"
  RuleType: "Single Event"
  AttackType: "CommandAndControl"
version: 1.0.0
kind: Scheduled
