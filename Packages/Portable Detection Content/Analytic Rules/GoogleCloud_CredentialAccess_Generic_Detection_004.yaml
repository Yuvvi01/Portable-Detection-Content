id: 3051da35-9036-5fa3-b6b1-561eada8f8c7
name: "GoogleCloud - CredentialAccess - Generic Detection 004"
description: |
  Identifies generic credential access activity in GoogleCloud telemetry. This rule is a reusable template and should be tuned with locally approved thresholds, allowlists, and field mappings before production use.
severity: Medium
status: Available
requiredDataConnectors:
- connectorId: GoogleCloudConnector
  dataTypes:
  - "GoogleCloud"
queryFrequency: 1h
queryPeriod: 1h
triggerOperator: gt
triggerThreshold: 0
tactics:
- CredentialAccess
relevantTechniques:
- T1003
- T1552
query: |
  dataSource.name = 'GoogleCloud' AND event.category = 'identity_or_credential_activity' AND (event.action contains 'credential' OR event.action contains 'token' OR event.action contains 'secret')
customDetails:
  DataSource: "GoogleCloud"
  RuleType: "Single Event"
  AttackType: "CredentialAccess"
version: 1.0.0
kind: Scheduled
