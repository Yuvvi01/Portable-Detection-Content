id: bd9540aa-90fe-5f8c-b095-b66b42790742
name: "EndpointTelemetry - PrivilegeEscalation - Generic Detection 067"
description: |
  Identifies generic privilege escalation activity in EndpointTelemetry telemetry. This rule is a reusable template and should be tuned with locally approved thresholds, allowlists, and field mappings before production use.
severity: Critical
status: Available
requiredDataConnectors:
- connectorId: EndpointTelemetryConnector
  dataTypes:
  - "EndpointTelemetry"
queryFrequency: 1h
queryPeriod: 1h
triggerOperator: gt
triggerThreshold: 0
tactics:
- PrivilegeEscalation
relevantTechniques:
- T1078
- T1098
query: |
  dataSource.name = 'EndpointTelemetry' AND event.category = 'administrative_activity' AND (event.action contains 'role' OR event.action contains 'permission' OR event.action contains 'policy')
customDetails:
  DataSource: "EndpointTelemetry"
  RuleType: "Single Event"
  AttackType: "PrivilegeEscalation"
version: 1.0.0
kind: Scheduled
