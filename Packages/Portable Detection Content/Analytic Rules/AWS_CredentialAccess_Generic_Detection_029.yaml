id: 7132d4ef-7f70-5626-9e1d-1cca6cb762de
name: "AWS - CredentialAccess - Generic Detection 029"
description: |
  Identifies generic credential access activity in AWS telemetry. This rule is a reusable template and should be tuned with locally approved thresholds, allowlists, and field mappings before production use.
severity: Medium
status: Available
requiredDataConnectors:
- connectorId: AWSConnector
  dataTypes:
  - "AWS"
queryFrequency: 1h
queryPeriod: 1h
triggerOperator: gt
triggerThreshold: 0
tactics:
- CredentialAccess
relevantTechniques:
- T1003
- T1552
query: |
  dataSource.name = 'AWS' AND event.category = 'identity_or_credential_activity' AND (event.action contains 'credential' OR event.action contains 'token' OR event.action contains 'secret')
customDetails:
  DataSource: "AWS"
  RuleType: "Correlation"
  AttackType: "CredentialAccess"
version: 1.0.0
kind: Scheduled
