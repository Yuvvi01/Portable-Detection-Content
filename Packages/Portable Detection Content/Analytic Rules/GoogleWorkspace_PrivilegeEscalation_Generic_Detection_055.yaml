id: 28b49f24-596a-5bcc-94d6-cd6e52f87717
name: "GoogleWorkspace - PrivilegeEscalation - Generic Detection 055"
description: |
  Identifies generic privilege escalation activity in GoogleWorkspace telemetry. This rule is a reusable template and should be tuned with locally approved thresholds, allowlists, and field mappings before production use.
severity: Medium
status: Available
requiredDataConnectors:
- connectorId: GoogleWorkspaceConnector
  dataTypes:
  - "GoogleWorkspace"
queryFrequency: 1h
queryPeriod: 1h
triggerOperator: gt
triggerThreshold: 0
tactics:
- PrivilegeEscalation
relevantTechniques:
- T1078
- T1098
query: |
  dataSource.name = 'GoogleWorkspace' AND event.category = 'administrative_activity' AND (event.action contains 'role' OR event.action contains 'permission' OR event.action contains 'policy')
customDetails:
  DataSource: "GoogleWorkspace"
  RuleType: "Correlation"
  AttackType: "PrivilegeEscalation"
version: 1.0.0
kind: Scheduled
